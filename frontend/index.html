<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Manim AI Animation Generator</title>
    </head>
    <body>
        <h1>Manim AI Animation Generator</h1>
        <label for="prompt-input">
            Animation Prompt
        </label>
        <br><br>
        <textarea
            id="prompt-input"
            rows="6"
            cols="60"
            placeholder="Describe the animation you want">
        </textarea>
        <br><br>
        <label for="filename-input">
            Output Filename
        </label>
        <br><br>
        <input
            type="text"
            id="filename-input"
            value="generated_scene">
        <br><br>
        <button id="generate-btn">
            Generate!
        </button>
        <p id="status-text">
            Waiting for input...
        </p>
        <video
            id="video-player"
            controls
            style="display:none; width:700px;">
        </video>
        <script src="script.js"></script>
    </body>
</html>
